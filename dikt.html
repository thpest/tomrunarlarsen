<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dikt – Tom Runar Larsen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/stil.css">
</head>
<body>
  <header class="topp">
    <div class="topp-inner">
      <span class="merke"><b>Tom Runar Larsen</b></span>
      <nav class="nav">
        <a href="index.html">Dikt</a>
        <a href="skriv.html">Skriv</a>
      </nav>
    </div>
  </header>

  <main class="side">
    <p class="tilbake"><a href="index.html">← Alle dikt</a></p>
    <article id="dikt"><!-- fylles av JS --></article>
  </main>

  <footer class="bunn">
    © <span id="aar"></span> Tom Runar Larsen · Fredrikstad
  </footer>

  <script src="config.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function start() {
      document.getElementById("aar").textContent = new Date().getFullYear();
      const id = new URLSearchParams(location.search).get("id");
      const boks = document.getElementById("dikt");
      try {
        const data = await hentData();
        const d = (data.dikt || []).find(x => x.id === id);
        if (!d) {
          boks.innerHTML = '<p class="tom-melding">Fant ikke diktet.</p>';
          return;
        }
        document.title = d.tittel + " – Tom Runar Larsen";
        const meta = metaTekst(d);
        boks.innerHTML =
          '<div class="dikt-header">' +
            '<h1>' + trygg(d.tittel) + '</h1>' +
            (meta ? '<div class="dikt-meta">' + trygg(meta) + '</div>' : '') +
          '</div>' +
          '<div class="dikt-tekst">' + trygg(d.tekst) + '</div>';
      } catch (err) {
        boks.innerHTML = '<p class="tom-melding">' + trygg(err.message) + '</p>';
      }
    }
    start();
  </script>
</body>
</html>
